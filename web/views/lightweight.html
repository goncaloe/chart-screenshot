<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
html, body {
    margin: 4px;
    padding: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
}
#chart{
    width: 100vw;
    height: calc(100vh - 14px);
}
a#tv-attr-logo {
    display: none !important;
}


.tv-lightweight-charts > table > tr:first-child > td:nth-of-type(2) {
    border: 1px solid #808080;
}
.tv-lightweight-charts > table > tr:nth-of-type(2) > td {
    background: transparent !important;
}
.tv-lightweight-charts > table > tr:nth-of-type(3) > td:nth-of-type(2) {
    border: 1px solid #808080;
}

</style>
</head>
<body>
<div id="chart"></div>
<div id="volumeLabel"></div>

<script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
    const payload = __PAYLOAD__;
    
    const isDaily = (payload.candles[1].time - payload.candles[0].time) >= 86400;
    
    const container = document.getElementById('chart');
    const chart = LightweightCharts.createChart(container, {
        //autoSize: true,
        width: document.body.clientWidth - 2,
        height: document.body.clientHeight - 13,
        layout: {
            background: { color: '#000000' },
            textColor: '#cfcfcf',
            panes: {
                enableResize: true,
                separatorColor: '#808080',
                separatorHoverColor: 'rgba(128,128,128,0.5)'
            }
        },
        grid: {
            vertLines: { color: '#222222', style: 1 },
            horzLines: { color: '#222222', style: 1 },
        },
        timeScale: {
            borderVisible: false,
            timeVisible: true,
            secondsVisible: false,
            fixRightEdge: true,
            rightOffset: 0,
            fixLeftEdge: true,
        },
        rightPriceScale: {
            borderVisible: false,
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
        },
    });

    
    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
        upColor: '#00aa00',
        downColor: '#d20000',
        borderVisible: false,
        wickUpColor: '#ffffff',
        wickDownColor: '#ffffff',
        priceLineVisible: false, 
        lastValueVisible: false
    });
    candleSeries.priceScale().applyOptions({
        scaleMargins: {
            top: 0.05,
            bottom: 0.04
        },
    });

    const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
        priceScaleId: 'volScale',
        priceLineVisible: false, 
        lastValueVisible: false,
    }, 1);
    volumeSeries.priceScale().applyOptions({
        scaleMargins: {
            top: 0.1,
            bottom: 0
        },
    });

    candleSeries.setData(payload.candles);
    volumeSeries.setData(payload.volume);

    const ema9Series = chart.addSeries(LightweightCharts.LineSeries, { color: '#ffffff', lineWidth: 1.25, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
    ema9Series.setData(payload.ema9);
    const ema20Series = chart.addSeries(LightweightCharts.LineSeries, { color: '#3399ff', lineWidth: 1.25, priceLineVisible: false, lastValueVisible: false });
    ema20Series.setData(payload.ema20);
    if(payload.ema80){
        const ema80Series = chart.addSeries(LightweightCharts.LineSeries, { color: '#980098', lineWidth: 1.25, priceLineVisible: false, lastValueVisible: false });
        ema80Series.setData(payload.ema80);
    }
    if(payload.vwap){
        const vwapSeries = chart.addSeries(LightweightCharts.LineSeries, { color: '#ffcc00', lineWidth: 1.25, priceLineVisible: false, lastValueVisible: false });
        vwapSeries.setData(payload.vwap);
    }
    
    const pane = chart.panes()[1];
    pane.setHeight(80);

    const totalBars = payload.candles.length;
    const barsToShow = 200;
    chart.timeScale().setVisibleLogicalRange({
        from: Math.floor(totalBars - barsToShow),
        to: Math.floor(totalBars - 1)
    });


    class VerticalLinesPaneRenderer {
        constructor(items) { this._items = items; }
        draw(target) {
            target.useMediaCoordinateSpace(scope => {
                const ctx = scope.context;
                ctx.save();
                ctx.imageSmoothingEnabled = false;
                ctx.lineWidth = 1;
                ctx.setLineDash([6, 3]);
                for (const it of this._items) {
                    const x = Math.round(it.x) - 0.5;
                    ctx.strokeStyle = it.color;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, scope.mediaSize.height);
                    ctx.stroke();
                }
                ctx.restore();
            });
        }
    }

    class VerticalLinesPaneView {
        constructor(source) { this._source = source; this._items = []; }
        update() {
            const chart = this._source._chart;
            if (!chart) { this._items = []; return; }
            const ts = chart.timeScale();
            this._items = this._source._lines.map(l => {
                const x = ts.timeToCoordinate(l.time);
                const prevX = ts.timeToCoordinate(l.prevTime);
                if (x === null || prevX === null) return null;
                return { x: (prevX + x + 1.7) / 2, color: l.color };
            }).filter(Boolean);
        }
        renderer() { return new VerticalLinesPaneRenderer(this._items); }
    }

    class VerticalLinesPrimitive {
        constructor(lines) { this._lines = lines; this._chart = null; this._view = new VerticalLinesPaneView(this); }
        attached(param) { this._chart = param.chart; }
        detached() { this._chart = null; }
        updateAllViews() { this._view.update(); }
        paneViews() { return [this._view]; }
    }

    // Linhas verticais: transições de dia (cinza), open 10:30 (amarelo), close 17:00 (azul).
    // prevTime é a vela imediatamente anterior, para posicionar a linha entre velas.
    const verticalLines = [];
    if(payload.candles.length > 1 && !isDaily){
        for (let i = 1; i < payload.candles.length; i++) {
            const prev = payload.candles[i - 1];
            const curr = payload.candles[i];
            const prevDate = new Date(prev.time * 1000);
            const currDate = new Date(curr.time * 1000);

            if (prevDate.toDateString() !== currDate.toDateString()) {
                verticalLines.push({ time: curr.time, prevTime: prev.time, color: '#7F7F7F' });
            }
            else if (currDate.getHours() === 10 && currDate.getMinutes() === 30) {
                verticalLines.push({ time: curr.time, prevTime: prev.time, color: '#DDB800' });
            }
            else if (currDate.getHours() === 17 && currDate.getMinutes() === 0) {
                verticalLines.push({ time: curr.time, prevTime: prev.time, color: '#0026FF' });
            }
        }
    }

    if (verticalLines.length) {
        chart.panes().forEach(p => p.attachPrimitive(new VerticalLinesPrimitive(verticalLines)));
    }

    let volumeLabelEl;
    function formatVolume(value, decimals) { 
        if (value >= 1e9) return (value / 1e9).toFixed(decimals) + 'B';
        if (value >= 1e6) return (value / 1e6).toFixed(decimals) + 'M';
        if (value >= 1e3) return (value / 1e3).toFixed(decimals) + 'K';
        return value.toString();
    }
    function updateVolumeLabel() {
        if (!volumeLabelEl) return;
        const range = chart.timeScale().getVisibleLogicalRange();
        if (!range) return;
        const from = Math.max(0, Math.floor(range.from));
        const to = Math.min(payload.volume.length - 1, Math.ceil(range.to));
        let max = 0;
        for (let i = from; i <= to; i++) {
            const v = payload.volume[i];
            if (v && v.value > max) max = v.value;
        }
        volumeLabelEl.textContent = formatVolume(max, 1);
    }

    chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
        updateVolumeLabel();
    });


    // para fixar o espaçamento entre as barras
    //chart.timeScale().applyOptions({
    //    barSpacing: 10,
    //    minBarSpacing: 10,
    //    maxBarSpacing: 10,
    //});

    // Handle resize
    const resizeObserver = new ResizeObserver(() => {
      const { width, height } = container.getBoundingClientRect();
      chart.resize(width, height);
    });
    resizeObserver.observe(container);

    requestAnimationFrame(() => {
        const tr = document.querySelector('.tv-lightweight-charts > table > tr:nth-of-type(2) > td[colspan="3"]').parentElement;
        tr.setAttribute("style", "height: 5px !important;");
        
        const divCanvas = document.querySelector('.tv-lightweight-charts > table > tr:first-child > td:nth-of-type(2) > div');

        const divVolRgt = document.querySelector('.tv-lightweight-charts > table > tr:nth-of-type(3) > td:nth-of-type(3) > div');
        if (divVolRgt) {
            volumeLabelEl = document.createElement('span');
            volumeLabelEl.style.cssText = 'position: absolute; left: 9px; top: 2px; color: #cfcfcf; font-size: 12px; font-family: Arial; z-index: 100; pointer-events: none;';
            divVolRgt.appendChild(volumeLabelEl);
            updateVolumeLabel();
        }


        if(payload.symbol) {
            let sLabel = payload.symbol;
            if(payload.timeframe) sLabel += ' | ' + payload.timeframe;
            divCanvas.insertAdjacentHTML('beforeend', '<span style="position: absolute; left: 5px; top: 2px; color: #fff; font-size: 12px; font-family: Arial; font-weight: bold; z-index: 100;">' + sLabel + '</span>');
        }
    });

    window.onkeydown = function(e){
        if(e.altKey && e.keyCode == 83){
            e.preventDefault();
            const range = chart.timeScale().getVisibleRange();
            fetch('/api/print-bounds', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                    ym: payload.ym,
                    dd: payload.dd,
                    filename: payload.filename,
                    timeframe: payload.timeframe,
                    datestart: range.from,
                    dateend: range.to
                })
            }).then(async r => {
                const body = await r.json().catch(() => ({}));
                if (!r.ok) console.error('Erro ao guardar bounds:', body.error || r.statusText);
                else console.log('Bounds saved:', body.path);
            }).catch(err => console.error('Erro ao guardar bounds:', err));
        }
    }


</script>

</body>
</html>
